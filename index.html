<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard — BeaverMind.ai</title>
<style>
:root{--bg:#f5f5f7;--bg-card:#fff;--bg-header:#fff;--text:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;--border:#e5e5ea;--border-light:#f2f2f7;--accent:#0071e3;--green:#30d158;--yellow:#ffd60a;--red:#ff453a;--gray:#8e8e93;--green-bg:rgba(48,209,88,.1);--yellow-bg:rgba(255,214,10,.1);--red-bg:rgba(255,69,58,.1);--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 4px 12px rgba(0,0,0,.08);--radius:10px;--radius-sm:6px;--transition:.2s ease;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
[data-theme=dark]{--bg:#1c1c1e;--bg-card:#2c2c2e;--bg-header:#2c2c2e;--text:#f5f5f7;--text-secondary:#aeaeb2;--text-tertiary:#636366;--border:#3a3a3c;--border-light:#2c2c2e;--green-bg:rgba(48,209,88,.15);--yellow-bg:rgba(255,214,10,.15);--red-bg:rgba(255,69,58,.15);--shadow:0 1px 3px rgba(0,0,0,.2);--shadow-lg:0 4px 12px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.header{background:var(--bg-header);border-bottom:1px solid var(--border);padding:12px 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.health-badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.health-badge.healthy{background:var(--green)}.health-badge.warning{background:var(--yellow);color:var(--text)}.health-badge.critical{background:var(--red)}
.header-info{flex:1;min-width:200px}.header-title{font-size:16px;font-weight:600}
.header-meta{font-size:12px;color:var(--text-secondary);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.stale-warning{display:inline-flex;align-items:center;gap:4px;color:#b8860b;font-size:11px;font-weight:600;background:var(--yellow-bg);padding:2px 8px;border-radius:12px}
[data-theme=dark] .stale-warning{color:var(--yellow)}
.header-controls{display:flex;align-items:center;gap:8px}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;width:200px;outline:none;transition:border var(--transition)}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--text-tertiary)}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition)}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.tabs{max-width:1200px;margin:0 auto;padding:12px 24px 0;display:flex;gap:4px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition);border-radius:var(--radius-sm) var(--radius-sm) 0 0;font-family:var(--font)}
.tab:hover{color:var(--text);background:var(--border-light)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{max-width:1200px;margin:0 auto;padding:16px 24px 48px}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.section+.section{margin-top:16px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.operational,.status-dot.working,.status-dot.active{background:var(--green)}
.status-dot.warning{background:var(--yellow)}.status-dot.critical,.status-dot.error{background:var(--red)}
.status-dot.unknown,.status-dot.inactive{background:var(--gray)}
.platform-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.platform-row:last-child{border-bottom:none}.platform-name{font-size:13px;font-weight:500;flex:1}
.platform-summary{font-size:12px;color:var(--text-secondary)}
.mcp-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-light);font-size:12px;font-weight:500}
.rec-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.rec-item:last-child{border-bottom:none}.rec-icon{flex-shrink:0;font-size:14px}
.table-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.table-row:last-child{border-bottom:none}
.table-count{font-size:12px;color:var(--text-secondary);background:var(--border-light);padding:1px 8px;border-radius:10px;font-weight:500}
.category-group{margin-bottom:16px}.category-group:last-child{margin-bottom:0}
.category-header{font-size:13px;font-weight:600;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.asset-row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background var(--transition);border-radius:var(--radius-sm)}
.asset-row:hover{background:var(--border-light)}.asset-row:last-of-type{border-bottom:none}
.asset-name{font-size:13px;font-weight:500;flex:1}
.asset-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
.asset-badge.active{background:var(--green-bg);color:#1a9e3e}
[data-theme=dark] .asset-badge.active{color:var(--green)}
.asset-badge.inactive{background:var(--border-light);color:var(--gray)}
.asset-badge.skill{background:rgba(0,113,227,.1);color:var(--accent)}
.asset-badge.task{background:rgba(175,82,222,.1);color:#af52de}
.asset-desc{font-size:12px;color:var(--text-secondary);padding:4px 0 6px 28px;max-height:0;overflow:hidden;transition:max-height .2s ease,padding .2s ease,opacity .15s ease;opacity:0}
.asset-desc.open{max-height:80px;opacity:1;padding:4px 0 6px 28px}
.chevron{font-size:10px;color:var(--text-tertiary);transition:transform .15s ease;flex-shrink:0;display:inline-block}
.chevron.open{transform:rotate(90deg)}
.tree-node{padding-left:16px}.tree-root{padding-left:0}
.tree-label{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;cursor:default}
.tree-icon{font-size:12px}.tree-count{font-size:11px;color:var(--text-tertiary)}
.history-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-light)}
.history-row:last-child{border-bottom:none}
.history-score{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.history-date{font-size:12px;color:var(--text-secondary);min-width:80px}
.history-summary{font-size:13px;flex:1}
.search-hidden{display:none!important}
.no-results{text-align:center;padding:32px;color:var(--text-secondary);font-size:14px}
@media(max-width:768px){.header{padding:10px 16px}.header-inner{gap:10px}.search-input{width:140px}.grid-2,.grid-3{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}.main{padding:12px 16px 48px}.tabs{padding:10px 16px 0}}
</style>
</head>
