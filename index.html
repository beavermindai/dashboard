<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeaverMind — VPS Operations</title>
<style>
:root{--bg:#FAFAFA;--surface:#FFF;--surface2:#F3F4F6;--border:#E5E7EB;--text:#111827;--text2:#6B7280;--text3:#9CA3AF;--blue:#3B82F6;--blue-bg:#EFF6FF;--green:#10B981;--green-bg:#ECFDF5;--purple:#8B5CF6;--purple-bg:#F5F3FF;--orange:#F59E0B;--orange-bg:#FFFBEB;--teal:#14B8A6;--teal-bg:#F0FDFA;--red:#EF4444;--red-bg:#FEF2F2;--gray:#6B7280;--gray-bg:#F9FAFB;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 12px rgba(0,0,0,.1);--r:12px;--rs:8px}
[data-theme=dark]{--bg:#0F172A;--surface:#1E293B;--surface2:#334155;--border:#475569;--text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;--blue-bg:#1E3A5F;--green-bg:#134E4A;--purple-bg:#2E1065;--orange-bg:#451A03;--teal-bg:#134E4A;--red-bg:#450A0A;--gray-bg:#1E293B;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 4px 12px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:24px;max-width:900px;margin:0 auto;transition:background .3s,color .3s}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.header h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
.header h1 span{color:var(--blue)}
.header-right{display:flex;align-items:center;gap:12px}
.theme-toggle{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:14px;color:var(--text);transition:all .2s}
.theme-toggle:hover{box-shadow:var(--shadow-lg)}
.updated{font-size:11px;color:var(--text3)}

/* Top Row */
.top-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:20px;min-width:260px}
.score-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}
.score-circle.healthy{background:var(--green)}
.score-circle.warning{background:var(--orange)}
.score-circle.critical{background:var(--red)}
.score-info h2{font-size:18px;font-weight:600;margin-bottom:2px}
.score-info p{font-size:13px;color:var(--text2)}
.right-col{display:flex;flex-direction:column;gap:8px;flex:1;min-width:240px}
.platform{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.platform-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.platform-dot.operational{background:var(--green)}
.platform-dot.degraded{background:var(--orange)}
.platform-dot.down,.platform-dot.critical{background:var(--red)}
.platform-dot.unknown{background:var(--text3)}
.platform-name{font-weight:600;font-size:13px}
.platform-summary{font-size:11px;color:var(--text2);margin-left:auto;text-align:right;max-width:55%}
.paused-note{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;box-shadow:var(--shadow);font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px}

/* Section */
.section{margin-bottom:20px}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* Workflow Cards */
.wf-list{display:flex;flex-direction:column;gap:8px}
.wf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:12px}
.wf-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.wf-body{flex:1;min-width:0}
.wf-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wf-name{font-size:14px;font-weight:600}
.wf-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.wf-badge.running{background:var(--green-bg);color:var(--green)}
.wf-badge.error{background:var(--red-bg);color:var(--red)}
.wf-badge.warning{background:var(--orange-bg);color:var(--orange)}
.wf-desc{font-size:12px;color:var(--text2);margin-top:3px}
.wf-meta{display:flex;gap:16px;margin-top:6px;flex-wrap:wrap}
.wf-meta-item{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.wf-meta-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wf-meta-item .dot.green{background:var(--green)}
.wf-meta-item .dot.orange{background:var(--orange)}
.wf-meta-item .dot.red{background:var(--red)}

/* Supabase compact */
.supabase-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 16px;box-shadow:var(--shadow);font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}
.supabase-summary strong{color:var(--text);font-size:16px}

/* Recommendations */
.rec-list{display:flex;flex-direction:column;gap:6px}
.rec-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;box-shadow:var(--shadow);font-size:13px;display:flex;align-items:flex-start;gap:8px}
.rec-num{background:var(--blue-bg);color:var(--blue);font-weight:700;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* History */
.history-row{display:flex;gap:6px;flex-wrap:wrap}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;box-shadow:var(--shadow);text-align:center;min-width:70px}
.history-date{font-size:10px;color:var(--text3)}
.history-score{font-size:20px;font-weight:700}
.history-score.h{color:var(--green)}.history-score.w{color:var(--orange)}.history-score.c{color:var(--red)}

/* Footer */
.footer{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);text-align:center;font-size:12px;color:var(--text2)}
.footer code{background:var(--blue-bg);color:var(--blue);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500}
.empty{padding:20px;text-align:center;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F3D7; Beaver<span>Mind</span> <span style="font-weight:400;font-size:16px;color:var(--text3)">VPS Operations</span></h1>
  <div class="header-right">
    <span class="updated" id="lastUpdated"></span>
    <button class="theme-toggle" onclick="document.body.dataset.theme=document.body.dataset.theme==='dark'?'':'dark'">&#127763;</button>
  </div>
</div>

<!-- Score + Platforms -->
<div class="top-row">
  <div class="score-card">
    <div class="score-circle" id="scoreCircle">—</div>
    <div class="score-info">
      <h2 id="scoreLabel">Loading...</h2>
      <p id="scoreSub">Fetching health data</p>
    </div>
  </div>
  <div class="right-col" id="rightCol">
    <div id="platforms"></div>
    <div class="paused-note" id="pausedNote" style="display:none">&#128230; <span id="pausedText"></span></div>
  </div>
</div>

<!-- Active Workflows -->
<div class="section">
  <div class="section-title">&#9889; Active Workflows <span id="wfCount" style="font-weight:400"></span></div>
  <div class="wf-list" id="workflows"></div>
</div>

<!-- Supabase -->
<div class="section" id="supabaseSection" style="display:none">
  <div class="section-title">&#128451; Database</div>
  <div class="supabase-summary" id="supabaseSummary"></div>
</div>

<!-- Recommendations -->
<div class="section">
  <div class="section-title">&#128161; Recommendations</div>
  <div class="rec-list" id="recommendations"></div>
</div>

<!-- Score History -->
<div class="section" id="historySection" style="display:none">
  <div class="section-title">&#128200; Score History</div>
  <div class="history-row" id="history"></div>
</div>

<!-- Footer -->
<div class="footer">
  &#128187; For local Claude Code health (skills, MCP connections), run <code>/local-health</code> in Claude Code<br>
  <span style="margin-top:4px;display:inline-block;font-size:11px;color:var(--text3)">VPS health check runs daily at 3:00 PM Bangkok (08:00 UTC)</span>
</div>

<script>
var categoryIcons = {
  'linkedin':'&#128101;','content':'&#127916;','system':'&#127973;','crm':'&#128202;',
  'elevenlabs':'&#127897;','voice':'&#127897;','other':'&#9881;'
};

function renderDashboard(data) {
  var hr = data.healthReport || {};
  var score = hr.healthScore || 0;

  // Score circle
  var circle = document.getElementById('scoreCircle');
  circle.innerHTML = score + '<span style="font-size:14px;font-weight:400">/10</span>';
  circle.className = 'score-circle ' + (score >= 8 ? 'healthy' : score >= 5 ? 'warning' : 'critical');
  document.getElementById('scoreLabel').textContent = score >= 8 ? 'System Healthy' : score >= 5 ? 'Moderate Issues' : 'Critical Issues';

  var wfs = hr.workflows || [];
  var activeWfs = wfs.filter(function(w){return w.active});
  var pausedWfs = wfs.filter(function(w){return !w.active});
  document.getElementById('scoreSub').textContent = activeWfs.length + ' active workflows running';

  // Timestamp
  if (data.generatedAt) {
    var d = new Date(data.generatedAt);
    document.getElementById('lastUpdated').textContent = 'Updated: ' + d.toLocaleString('en-GB', {timeZone:'Asia/Bangkok', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) + ' ICT';
  }

  // Platforms
  var platforms = hr.platforms || {};
  var pEl = document.getElementById('platforms');
  pEl.innerHTML = '';
  var platformNames = {'n8n_vps': 'n8n VPS', 'apps_script': 'Apps Script'};
  for (var key in platforms) {
    var p = platforms[key];
    var s = p.status || 'unknown';
    pEl.innerHTML += '<div class="platform"><div class="platform-dot ' + s + '"></div><span class="platform-name">' + (platformNames[key] || key) + '</span><span class="platform-summary">' + (p.summary || '') + '</span></div>';
  }

  // Paused note
  if (pausedWfs.length > 0) {
    document.getElementById('pausedNote').style.display = '';
    document.getElementById('pausedText').textContent = pausedWfs.length + ' workflows intentionally paused';
  }

  // Workflows
  var wfEl = document.getElementById('workflows');
  wfEl.innerHTML = '';
  document.getElementById('wfCount').textContent = '(' + activeWfs.length + ')';

  if (activeWfs.length === 0) {
    wfEl.innerHTML = '<div class="empty">No workflow data available</div>';
  } else {
    activeWfs.forEach(function(w) {
      var cat = w.category || 'other';
      var icon = categoryIcons[cat] || '&#9881;';

      // Badge
      var badgeClass = 'running';
      var badgeText = 'Running';
      if (w.status === 'error' || w.status === 'failing') {
        badgeClass = 'error'; badgeText = 'Failing';
      } else if (w.status === 'warning' || w.status === 'intermittent') {
        badgeClass = 'warning'; badgeText = 'Warning';
      }

      // Meta items
      var meta = '';
      if (w.schedule) {
        meta += '<span class="wf-meta-item">&#128339; ' + w.schedule + '</span>';
      }
      if (w.lastRun) {
        meta += '<span class="wf-meta-item">&#9203; Last: ' + w.lastRun + '</span>';
      }
      if (w.successRate) {
        var dotColor = 'green';
        if (w.successRate.indexOf('fail') >= 0 || (w.successRate.indexOf('/') >= 0 && w.successRate.split('/')[0] !== w.successRate.split('/')[1])) dotColor = 'orange';
        meta += '<span class="wf-meta-item"><span class="dot ' + dotColor + '"></span> ' + w.successRate + '</span>';
      }

      wfEl.innerHTML += '<div class="wf-card"><span class="wf-icon">' + icon + '</span><div class="wf-body"><div class="wf-header"><span class="wf-name">' + (w.name || 'Unknown') + '</span><span class="wf-badge ' + badgeClass + '">' + badgeText + '</span></div>' + (w.description ? '<div class="wf-desc">' + w.description + '</div>' : '') + (meta ? '<div class="wf-meta">' + meta + '</div>' : '') + '</div></div>';
    });
  }

  // Supabase
  var tables = hr.supabaseTables || {};
  var tableKeys = Object.keys(tables);
  if (tableKeys.length > 0) {
    document.getElementById('supabaseSection').style.display = '';
    var totalRows = tableKeys.reduce(function(sum, k){ return sum + (tables[k] || 0); }, 0);
    document.getElementById('supabaseSummary').innerHTML = '&#128451; <strong>' + tableKeys.length + '</strong> tables &middot; <strong>' + totalRows.toLocaleString() + '</strong> total rows in Supabase';
  }

  // Recommendations
  var recs = hr.recommendations || [];
  var rEl = document.getElementById('recommendations');
  rEl.innerHTML = '';
  if (recs.length === 0) {
    rEl.innerHTML = '<div class="empty">No recommendations — everything looks good &#10003;</div>';
  } else {
    recs.forEach(function(r, i) {
      rEl.innerHTML += '<div class="rec-item"><span class="rec-num">' + (i+1) + '</span><span>' + r + '</span></div>';
    });
  }

  // History
  var history = hr.history || [];
  if (history.length > 0) {
    document.getElementById('historySection').style.display = '';
    var hEl = document.getElementById('history');
    hEl.innerHTML = '';
    history.slice(-10).forEach(function(h) {
      var cls = h.score >= 8 ? 'h' : h.score >= 5 ? 'w' : 'c';
      hEl.innerHTML += '<div class="history-item"><div class="history-score ' + cls + '">' + h.score + '</div><div class="history-date">' + (h.date || '') + '</div></div>';
    });
  }
}

fetch('./data.json?t='+Date.now()).then(function(r){
  if(!r.ok)throw new Error('Not found');
  return r.json();
}).then(function(data){
  renderDashboard(data);
}).catch(function(e){
  document.getElementById('scoreLabel').textContent = 'No Data Available';
  document.getElementById('scoreSub').textContent = 'Health check has not run yet';
});
</script>
</body>
</html>
